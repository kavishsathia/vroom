<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse — Service Unavailable</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0b0e14;
    color: #d1d5db;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    text-align: center;
    max-width: 480px;
    padding: 40px;
  }

  .error-code {
    font-size: 64px;
    font-weight: 700;
    color: #1e2536;
    letter-spacing: -2px;
    margin-bottom: 8px;
  }

  .icon-wrap {
    width: 56px;
    height: 56px;
    margin: 0 auto 24px;
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.15);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-wrap svg {
    width: 24px;
    height: 24px;
    stroke: #ef4444;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    color: #f3f4f6;
    margin-bottom: 8px;
  }

  p {
    color: #6b7280;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .status-box {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(239, 68, 68, 0.06);
    border: 1px solid rgba(239, 68, 68, 0.12);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #ef4444;
    margin-bottom: 32px;
  }

  .status-box .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ef4444;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .info {
    font-size: 12px;
    color: #4b5563;
    line-height: 1.8;
    font-family: 'SF Mono', 'Consolas', monospace;
  }

  .info span { color: #6b7280; }

  .footer {
    position: fixed;
    bottom: 24px;
    left: 0;
    right: 0;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .footer-logo {
    width: 20px;
    height: 20px;
    background: #2563eb;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.4;
  }

  .footer-logo svg { width: 12px; height: 12px; }

  .footer span {
    font-size: 12px;
    color: #374151;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="error-code">503</div>
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <h1>Service Maintenance</h1>
    <p>Pulse is currently undergoing scheduled maintenance. All services will be restored shortly. We apologize for the inconvenience.</p>
    <div class="status-box">
      <div class="dot"></div>
      Maintenance in progress
    </div>
    <div class="info">
      Incident ID: <span>INC-2026-0316-001</span><br>
      Start: <span>2026-03-16T14:00:00Z</span><br>
      Est. Duration: <span>~30 minutes</span><br>
      Contact: <span>ops@pulse.dev</span>
    </div>
  </div>
  <div class="footer">
    <div class="footer-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </div>
    <span>Pulse</span>
  </div>
</body>
</html>

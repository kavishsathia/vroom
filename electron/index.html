<!DOCTYPE html>
<html>
<head>
  <title>Vroom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
    }

    :root {
      --bg: #fff;
      --bg-secondary: #f8f9fa;
      --bg-card: #fff;
      --border: #e0e0e0;
      --border-subtle: #f0f0f0;
      --text: #202124;
      --text-secondary: #5f6368;
      --text-tertiary: #9aa0a6;
      --accent: #202124;
      --input-bg: #f1f3f4;
      --btn-bg: #202124;
      --btn-text: #fff;
      --btn-hover: #3c4043;
      --btn-disabled-bg: #e0e0e0;
      --btn-disabled-text: #9aa0a6;
      --card-active: #f8f9fa;
      --screenshot-bg: #f1f3f4;
      --status-done: #188038;
      --status-running: #1a73e8;
      --speech-queued: #e8710a;
      --speech-spotlight: #1a73e8;
      --log-bg: #f8f9fa;
      --sidebar-width: 240px;
      --sidebar-hover: #eef0f2;
      --sidebar-selected: #e3e6ea;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #202124;
        --bg-secondary: #292a2d;
        --bg-card: #292a2d;
        --border: #3c4043;
        --border-subtle: #35363a;
        --text: #e8eaed;
        --text-secondary: #9aa0a6;
        --text-tertiary: #5f6368;
        --accent: #e8eaed;
        --input-bg: #35363a;
        --btn-bg: #e8eaed;
        --btn-text: #202124;
        --btn-hover: #d2d4d7;
        --btn-disabled-bg: #3c4043;
        --btn-disabled-text: #5f6368;
        --card-active: #35363a;
        --screenshot-bg: #1a1a1d;
        --status-done: #81c995;
        --status-running: #8ab4f8;
        --speech-queued: #fdd663;
        --speech-spotlight: #8ab4f8;
        --log-bg: #292a2d;
        --sidebar-hover: #35363a;
        --sidebar-selected: #3c4043;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
    }

    /* Title bar area for traffic lights */
    .title-bar {
      height: 38px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding-left: 80px;
      padding-right: 16px;
    }
    .title-bar .title-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .title-bar .status-area {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      -webkit-app-region: no-drag;
    }
    .title-bar .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
    }
    .title-bar .status-dot.connected { background: var(--status-done); }
    .title-bar .status-text {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    /* Main layout: sidebar + content */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar .task-section {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar .task-section textarea {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      margin-bottom: 8px;
      resize: none;
      overflow: hidden;
      min-height: 34px;
      max-height: 160px;
      line-height: 1.4;
    }
    .sidebar .task-section textarea::placeholder { color: var(--text-tertiary); }
    .sidebar .task-section textarea:focus {
      box-shadow: 0 0 0 2px var(--speech-spotlight);
    }
    .sidebar .task-section .task-actions {
      display: flex;
      gap: 6px;
    }
    .sidebar .task-section button {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sidebar .task-section .run-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
    }
    .sidebar .task-section .run-btn:hover { background: var(--btn-hover); }
    .sidebar .task-section .run-btn:disabled {
      background: var(--btn-disabled-bg);
      color: var(--btn-disabled-text);
      cursor: not-allowed;
    }
    .sidebar .task-section .log-btn {
      background: var(--input-bg);
      color: var(--text-secondary);
      flex: 0 0 auto;
      padding: 7px 12px;
    }
    .sidebar .task-section .log-btn:hover { background: var(--sidebar-hover); }

    .sidebar .tabs-header {
      padding: 10px 12px 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
    }

    .sidebar .tab-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 6px 6px;
    }
    .sidebar .tab-list::-webkit-scrollbar { width: 4px; }
    .sidebar .tab-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .sidebar .sidebar-tab {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 8px 10px;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s;
      margin-bottom: 2px;
    }
    .sidebar .sidebar-tab:hover {
      background: var(--sidebar-hover);
    }
    .sidebar .sidebar-tab.focused {
      background: var(--sidebar-selected);
      color: var(--text);
    }

    .sidebar .sidebar-tab .tab-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sidebar .sidebar-tab .tab-dot.running { background: var(--status-running); }
    .sidebar .sidebar-tab .tab-dot.done { background: var(--status-done); }
    .sidebar .sidebar-tab .tab-dot.speaking {
      background: var(--speech-spotlight);
      box-shadow: 0 0 6px var(--speech-spotlight);
    }

    .sidebar .sidebar-tab .tab-info {
      flex: 1;
      min-width: 0;
    }
    .sidebar .sidebar-tab .tab-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: block;
      font-size: 12px;
      line-height: 1.3;
    }
    .sidebar .sidebar-tab .tab-step {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: block;
      font-size: 10px;
      color: var(--text-tertiary);
      line-height: 1.3;
      margin-top: 2px;
    }

    .sidebar .sidebar-tab .tab-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--status-running);
      font-weight: 500;
      flex-shrink: 0;
    }
    .sidebar .sidebar-tab .tab-badge.done {
      color: var(--status-done);
    }

    /* Content area */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      grid-auto-rows: 1fr;
      gap: 1px;
      padding: 1px;
      background: var(--border);
    }

    .tab-card {
      background: var(--bg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tab-card.active { background: var(--card-active); }

    .tab-card .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      gap: 12px;
    }
    .tab-card .card-header .tab-label {
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .tab-card .card-header .tab-status {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--status-running);
      font-weight: 500;
      white-space: nowrap;
    }
    .tab-card .card-header .tab-status.done {
      color: var(--status-done);
    }
    .tab-card .card-header .speech-indicator {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      background: transparent;
      color: var(--text-tertiary);
      font-weight: 500;
      white-space: nowrap;
      display: none;
    }
    .tab-card .card-header .speech-indicator.queued {
      display: inline-block;
      background: var(--input-bg);
      color: var(--speech-queued);
    }
    .tab-card .card-header .speech-indicator.spotlight {
      display: inline-block;
      background: var(--input-bg);
      color: var(--speech-spotlight);
    }

    .tab-card .screenshot-container {
      position: relative;
      background: var(--screenshot-bg);
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .tab-card .screenshot-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .tab-card .screenshot-container .placeholder {
      color: var(--text-tertiary);
      font-size: 13px;
    }
    .tab-card .step-info {
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border-subtle);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-panel {
      background: var(--log-bg);
      border-top: 1px solid var(--border);
      display: none;
      flex-direction: column;
      height: 200px;
      flex-shrink: 0;
    }
    .log-panel.open {
      display: flex;
    }
    .log-panel .log-header {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .log-panel .log-entries {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      font-size: 12px;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    }
    .log-panel .log-entry {
      padding: 4px 16px;
      border-bottom: 1px solid var(--border-subtle);
      line-height: 1.5;
      color: var(--text-secondary);
      word-break: break-word;
    }
    .log-panel .log-entry.highlight { color: var(--text); }

    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      background: var(--bg);
    }
    .empty-state p {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="title-bar">
    <span class="title-text">Vroom</span>
    <div class="status-area">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">connecting</span>
    </div>
  </div>
  <div class="main-layout">
    <div class="sidebar">
      <div class="task-section">
        <textarea id="taskInput" rows="1" placeholder="describe a task..." autofocus></textarea>
        <div class="task-actions">
          <button class="run-btn" id="runBtn">Run</button>
          <button class="log-btn" id="logToggle">Logs</button>
        </div>
      </div>
      <div class="tabs-header">Agents</div>
      <div class="tab-list" id="tabList"></div>
    </div>
    <div class="content-area">
      <div class="grid" id="grid">
        <div class="empty-state" id="emptyState">
          <p>waiting for task</p>
        </div>
      </div>
      <div class="log-panel" id="logPanel">
        <div class="log-header">Log</div>
        <div class="log-entries" id="logEntries"></div>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>

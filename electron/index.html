<!DOCTYPE html>
<html>
<head>
  <title>Vroom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
    }

    :root {
      --bg: #fff;
      --bg-secondary: #f8f9fa;
      --bg-card: #fff;
      --border: #e0e0e0;
      --border-subtle: #f0f0f0;
      --text: #202124;
      --text-secondary: #5f6368;
      --text-tertiary: #9aa0a6;
      --accent: #202124;
      --input-bg: #f1f3f4;
      --btn-bg: #202124;
      --btn-text: #fff;
      --btn-hover: #3c4043;
      --btn-disabled-bg: #e0e0e0;
      --btn-disabled-text: #9aa0a6;
      --card-active: #f8f9fa;
      --screenshot-bg: #f1f3f4;
      --status-done: #188038;
      --status-running: #1a73e8;
      --speech-queued: #e8710a;
      --speech-spotlight: #1a73e8;
      --log-bg: #f8f9fa;
      --sidebar-width: 240px;
      --sidebar-hover: #eef0f2;
      --sidebar-selected: #e3e6ea;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #202124;
        --bg-secondary: #292a2d;
        --bg-card: #292a2d;
        --border: #3c4043;
        --border-subtle: #35363a;
        --text: #e8eaed;
        --text-secondary: #9aa0a6;
        --text-tertiary: #5f6368;
        --accent: #e8eaed;
        --input-bg: #35363a;
        --btn-bg: #e8eaed;
        --btn-text: #202124;
        --btn-hover: #d2d4d7;
        --btn-disabled-bg: #3c4043;
        --btn-disabled-text: #5f6368;
        --card-active: #35363a;
        --screenshot-bg: #1a1a1d;
        --status-done: #81c995;
        --status-running: #8ab4f8;
        --speech-queued: #fdd663;
        --speech-spotlight: #8ab4f8;
        --log-bg: #292a2d;
        --sidebar-hover: #35363a;
        --sidebar-selected: #3c4043;
      }
    }

    /* Manual theme overrides */
    body.theme-light {
      --bg: #fff;
      --bg-secondary: #f8f9fa;
      --bg-card: #fff;
      --border: #e0e0e0;
      --border-subtle: #f0f0f0;
      --text: #202124;
      --text-secondary: #5f6368;
      --text-tertiary: #9aa0a6;
      --accent: #202124;
      --input-bg: #f1f3f4;
      --btn-bg: #202124;
      --btn-text: #fff;
      --btn-hover: #3c4043;
      --btn-disabled-bg: #e0e0e0;
      --btn-disabled-text: #9aa0a6;
      --card-active: #f8f9fa;
      --screenshot-bg: #f1f3f4;
      --status-done: #188038;
      --status-running: #1a73e8;
      --speech-queued: #e8710a;
      --speech-spotlight: #1a73e8;
      --log-bg: #f8f9fa;
      --sidebar-hover: #eef0f2;
      --sidebar-selected: #e3e6ea;
    }
    body.theme-dark {
      --bg: #202124;
      --bg-secondary: #292a2d;
      --bg-card: #292a2d;
      --border: #3c4043;
      --border-subtle: #35363a;
      --text: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-tertiary: #5f6368;
      --accent: #e8eaed;
      --input-bg: #35363a;
      --btn-bg: #e8eaed;
      --btn-text: #202124;
      --btn-hover: #d2d4d7;
      --btn-disabled-bg: #3c4043;
      --btn-disabled-text: #5f6368;
      --card-active: #35363a;
      --screenshot-bg: #1a1a1d;
      --status-done: #81c995;
      --status-running: #8ab4f8;
      --speech-queued: #fdd663;
      --speech-spotlight: #8ab4f8;
      --log-bg: #292a2d;
      --sidebar-hover: #35363a;
      --sidebar-selected: #3c4043;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      -webkit-app-region: drag;
    }

    /* Title bar */
    .title-bar {
      height: 38px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding-left: 16px;
      padding-right: 16px;
      -webkit-app-region: drag;
    }
    .title-bar .title-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .title-bar .nav-buttons {
      display: flex;
      gap: 2px;
      margin-left: 12px;
      -webkit-app-region: no-drag;
    }
    .title-bar .nav-btn {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 16px;
      cursor: pointer;
      padding: 4px 7px;
      border-radius: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .title-bar .nav-btn:hover { color: var(--text); background: var(--sidebar-hover); }
    .title-bar .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .title-bar .nav-btn:disabled:hover { background: none; color: var(--text-tertiary); }
    .title-bar .url-bar {
      flex: 1;
      max-width: 480px;
      margin: 0 auto;
      -webkit-app-region: no-drag;
    }
    .title-bar .url-bar input {
      width: 100%;
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      outline: none;
      text-align: center;
    }
    .title-bar .url-bar input::placeholder { color: var(--text-tertiary); }
    .title-bar .url-bar input:focus {
      text-align: left;
      box-shadow: 0 0 0 2px var(--speech-spotlight);
    }
    .title-bar .status-area {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    .title-bar .pause-btn {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .title-bar .pause-btn:hover { color: var(--text); background: var(--sidebar-hover); }
    .title-bar .pause-btn.active {
      color: #f59e0b;
    }
    .title-bar .pause-btn.hidden { display: none; }
    .title-bar .take-control-btn {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .title-bar .take-control-btn:hover { color: var(--text); background: var(--sidebar-hover); }
    .title-bar .take-control-btn.active { color: #34a853; }
    .title-bar .take-control-btn.hidden { display: none; }
    .title-bar .unmute-btn {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .title-bar .unmute-btn:hover { color: var(--text); background: var(--sidebar-hover); }
    .title-bar .unmute-btn.active {
      color: #ea4335;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .title-bar .theme-toggle {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 14px;
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    .title-bar .theme-toggle:hover { color: var(--text); background: var(--sidebar-hover); }
    .title-bar .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
    }
    .title-bar .status-dot.connected { background: var(--status-done); }
    .title-bar .status-text {
      font-size: 11px;
      color: var(--text-tertiary);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Main layout: sidebar full height on left, right column has title bar + content */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }
    .right-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .right-column .right-body {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      padding-top: 38px; /* space for traffic lights */
    }
    body.fullscreen .sidebar {
      padding-top: 8px;
    }
    .sidebar .task-section {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
    }
    .sidebar .task-section .new-task-btn {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 8px;
      background: var(--btn-bg);
      color: var(--btn-text);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sidebar .task-section .new-task-btn:hover { background: var(--btn-hover); }
    .sidebar .task-section .log-btn {
      flex: 0 0 auto;
      padding: 7px 12px;
      border: none;
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sidebar .task-section .log-btn:hover { background: var(--sidebar-hover); }
    /* Task group */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .sidebar .task-group {
      margin: 0 6px 4px;
      border-radius: 8px;
      background: var(--input-bg);
      overflow: hidden;
    }
    .sidebar .task-group .task-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      border: none;
      background: none;
      width: 100%;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
    }
    .sidebar .task-group .task-group-header:hover {
      background: var(--sidebar-hover);
    }
    .sidebar .task-group .task-group-header .tab-close {
      display: none;
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 14px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      border-radius: 4px;
      flex: 0 0 auto;
    }
    .sidebar .task-group .task-group-header:hover .tab-close {
      display: block;
    }
    .sidebar .task-group .task-group-header .tab-close:hover {
      color: var(--text);
      background: var(--sidebar-hover);
    }
    .sidebar .task-group .task-group-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--status-running);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    .sidebar .task-group.complete .task-group-dot {
      background: var(--status-done);
      animation: none;
    }
    .sidebar .task-group .task-group-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sidebar .task-group .task-group-tabs {
      padding: 0 4px 4px;
    }
    .sidebar .task-group .task-group-tabs .sidebar-tab {
      padding-left: 26px;
    }
    .sidebar .task-group .task-group-tabs .sidebar-tab .tab-dot {
      animation: pulse 2s ease-in-out infinite;
    }
    .sidebar .task-group .task-group-tabs .sidebar-tab .tab-dot.done {
      animation: none;
    }
    .sidebar .task-group .task-group-tabs .sidebar-tab .tab-dot.speaking {
      animation: none;
    }

    .sidebar .tabs-header {
      padding: 10px 12px 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar .tabs-header .new-tab-btn {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      border-radius: 4px;
    }
    .sidebar .tabs-header .new-tab-btn:hover {
      color: var(--text);
      background: var(--sidebar-hover);
    }
    .sidebar .sidebar-tab .tab-close {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 14px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      border-radius: 4px;
      flex-shrink: 0;
      display: none;
    }
    .sidebar .sidebar-tab:hover .tab-close {
      display: block;
    }
    .sidebar .sidebar-tab .tab-close:hover {
      color: var(--text);
      background: var(--sidebar-hover);
    }
    .sidebar .tab-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 6px 6px;
    }
    .sidebar .tab-list::-webkit-scrollbar { width: 4px; }
    .sidebar .tab-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
    .sidebar .sidebar-tab {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 8px 10px;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      transition: background 0.1s;
      margin-bottom: 2px;
    }
    .sidebar .sidebar-tab:hover { background: var(--sidebar-hover); }
    .sidebar .sidebar-tab.focused {
      background: var(--sidebar-selected);
      color: var(--text);
    }
    .sidebar .sidebar-tab .tab-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sidebar .sidebar-tab .tab-favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 2px;
      object-fit: contain;
      display: none;
    }
    .sidebar .sidebar-tab .tab-favicon.visible {
      display: block;
    }
    .sidebar .sidebar-tab .tab-favicon.visible + .tab-dot {
      display: none;
    }
    .sidebar .sidebar-tab .tab-dot.running { background: var(--status-running); }
    .sidebar .sidebar-tab .tab-dot.done { background: var(--status-done); }
    .sidebar .sidebar-tab .tab-dot.speaking {
      background: var(--speech-spotlight);
      box-shadow: 0 0 6px var(--speech-spotlight);
    }
    .sidebar .sidebar-tab .tab-info {
      flex: 1;
      min-width: 0;
    }
    .sidebar .sidebar-tab .tab-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: block;
      font-size: 12px;
      line-height: 1.3;
    }
    .sidebar .sidebar-tab .tab-step {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: block;
      font-size: 10px;
      color: var(--text-tertiary);
      line-height: 1.3;
      margin-top: 2px;
    }
    .sidebar .sidebar-tab .tab-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--status-running);
      font-weight: 500;
      flex-shrink: 0;
    }
    .sidebar .sidebar-tab .tab-badge.done { color: var(--status-done); }

    /* Resize handles */
    .sidebar-resize-handle {
      width: 1px;
      cursor: col-resize;
      background: var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .sidebar-resize-handle::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: -3px;
      width: 7px;
    }
    .sidebar-resize-handle:hover,
    .sidebar-resize-handle.active {
      background: var(--speech-spotlight);
    }
    .log-resize-handle {
      height: 1px;
      cursor: row-resize;
      background: var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .log-resize-handle::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: -3px;
      height: 7px;
    }
    .log-resize-handle:hover,
    .log-resize-handle.active {
      background: var(--speech-spotlight);
    }

    /* Content area */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .content-view {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* Webview layer — behind grid, webviews always render at full size */
    .webview-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    .webview-layer webview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .webview-layer webview.focused {
      z-index: 10;
      pointer-events: auto;
    }

    /* Grid — sits on top of webview layer */
    .grid {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      grid-auto-rows: 1fr;
      gap: 1px;
      padding: 1px;
      background: var(--border);
      overflow: auto;
    }
    .grid.hidden {
      display: none;
    }
    .grid.drag-over {
      outline: 2px dashed var(--speech-spotlight);
      outline-offset: -2px;
    }

    /* Floating grid controls (Zoom-style) */
    .grid-controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .grid-controls.visible { display: flex; }
    .grid-controls .unmute-btn,
    .grid-controls .pause-btn {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .grid-controls .unmute-btn:hover,
    .grid-controls .pause-btn:hover { background: var(--sidebar-hover); color: var(--text); }
    .grid-controls .unmute-btn.active { color: #ea4335; animation: pulse 1.5s ease-in-out infinite; background: rgba(234,67,53,0.1); }
    .grid-controls .pause-btn.active { color: #f59e0b; background: rgba(245,158,11,0.1); }

    .tab-card {
      background: var(--bg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tab-card.active { background: var(--card-active); }
    .tab-card.unattached { opacity: 0.7; }
    .tab-card.unattached .tab-status { display: none; }
    .tab-card.done { opacity: 0.8; }
    .tab-card.done .tab-status { color: var(--status-done); }

    .tab-card .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      gap: 12px;
    }
    .tab-card .card-header .tab-label {
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .tab-card .card-header .tab-status {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--status-running);
      font-weight: 500;
      white-space: nowrap;
    }
    .tab-card .card-header .tab-status.done { color: var(--status-done); }
    .tab-card .card-header .speech-indicator {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      background: transparent;
      color: var(--text-tertiary);
      font-weight: 500;
      white-space: nowrap;
      display: none;
    }
    .tab-card .card-header .speech-indicator.queued {
      display: inline-block;
      background: var(--input-bg);
      color: var(--speech-queued);
    }
    .tab-card .card-header .speech-indicator.spotlight {
      display: inline-block;
      background: var(--input-bg);
      color: var(--speech-spotlight);
    }

    .tab-card .screenshot-container {
      position: relative;
      background: var(--screenshot-bg);
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .tab-card .screenshot-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .tab-card .screenshot-container .placeholder {
      color: var(--text-tertiary);
      font-size: 13px;
    }
    .tab-card .step-info {
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border-subtle);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-panel {
      background: var(--log-bg);
      display: none;
      flex-direction: column;
      height: 200px;
      flex-shrink: 0;
    }
    .log-panel.open { display: flex; }
    .log-panel .log-header {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .log-panel .log-entries {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      font-size: 12px;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    }
    .log-panel .log-entry {
      padding: 4px 16px;
      border-bottom: 1px solid var(--border-subtle);
      line-height: 1.5;
      color: var(--text-secondary);
      word-break: break-word;
    }
    .log-panel .log-entry.highlight { color: var(--text); }

    /* Chat sidebar — only visible in grid/meeting view */
    .chat-sidebar {
      width: 280px;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
    }
    .chat-sidebar.hidden { display: none; }
    .chat-sidebar .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .chat-sidebar .panel-tab {
      flex: 1;
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: inherit;
    }
    .chat-sidebar .panel-tab:hover { color: var(--text-secondary); }
    .chat-sidebar .panel-tab.active {
      color: var(--text);
      border-bottom-color: var(--speech-spotlight);
    }
    .chat-sidebar .panel-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-sidebar .panel-content.hidden { display: none; }
    .chat-sidebar .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chat-sidebar .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-sidebar .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
    .chat-sidebar .chat-msg {
      max-width: 90%;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }
    .chat-sidebar .chat-msg.agent {
      align-self: flex-start;
      background: var(--input-bg);
      color: var(--text);
    }
    .chat-sidebar .chat-msg.user {
      align-self: flex-end;
      background: var(--btn-bg);
      color: var(--btn-text);
    }
    .chat-sidebar .chat-msg .chat-sender {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-tertiary);
      margin-bottom: 2px;
    }
    .chat-sidebar .chat-msg.user .chat-sender {
      color: var(--btn-disabled-text);
    }
    .chat-sidebar .chat-input-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-top: 1px solid var(--border);
    }
    .chat-sidebar .chat-input {
      flex: 1;
      padding: 6px 10px;
      border: none;
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }
    .chat-sidebar .chat-input::placeholder { color: var(--text-tertiary); }
    .chat-sidebar .chat-input:focus { box-shadow: 0 0 0 2px var(--speech-spotlight); }
    .chat-sidebar .chat-send-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      background: var(--btn-bg);
      color: var(--btn-text);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .chat-sidebar .chat-send-btn:hover { background: var(--btn-hover); }

    /* Contracts panel */
    .contracts-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .contracts-list::-webkit-scrollbar { width: 4px; }
    .contracts-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .contract-card {
      background: var(--input-bg);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
    }
    .contract-card .contract-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .contract-card .contract-agent {
      font-weight: 600;
      color: var(--text);
    }
    .contract-card .contract-task {
      font-size: 11px;
      color: var(--text-tertiary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .contract-card .commitment {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 3px 0;
      line-height: 1.4;
      color: var(--text-secondary);
    }
    .contract-card .commitment .c-icon {
      flex-shrink: 0;
      width: 14px;
      text-align: center;
      font-size: 11px;
    }
    .contract-card .commitment.done { color: var(--text-tertiary); text-decoration: line-through; }
    .contract-card .commitment.done .c-icon { color: #34a853; }
    .contract-card .commitment.failed .c-icon { color: #ea4335; }
    .contract-card .contract-memos {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    .contract-card .memo {
      font-size: 11px;
      color: var(--text-tertiary);
      padding: 2px 0;
      font-style: italic;
    }

    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      background: var(--bg);
      height: 100%;
      overflow: hidden;
    }

    /* Home page */
    .home-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    .home-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 12vh;
      width: 100%;
      flex-shrink: 0;
    }
    .home-logo {
      width: 100px;
      height: 100px;
      border-radius: 20px;
    }
    .home-prompt-row {
      display: flex;
      width: 100%;
      max-width: 540px;
      gap: 8px;
      margin-top: 28px;
      padding: 0 24px;
    }
    .home-prompt-input {
      flex: 1;
      padding: 11px 20px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }
    .home-prompt-input::placeholder { color: var(--text-tertiary); }
    .home-prompt-input:focus { border-color: var(--speech-spotlight); }
    .home-run-btn {
      padding: 11px 24px;
      border-radius: 24px;
      border: none;
      background: var(--btn-bg);
      color: var(--btn-text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .home-run-btn:hover { background: var(--btn-hover); }
    .home-columns {
      display: flex;
      gap: 32px;
      width: 100%;
      max-width: 900px;
      margin-top: 40px;
      padding: 0 24px 48px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .home-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .home-col-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .home-col-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      position: relative;
      mask-image: linear-gradient(to bottom, black calc(100% - 40px), transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black calc(100% - 40px), transparent 100%);
      padding-bottom: 40px;
    }
    .home-col-scroll::-webkit-scrollbar { display: none; }

    .home-task-list {
      columns: 2;
      column-gap: 8px;
    }
    .home-task-card {
      break-inside: avoid;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 8px;
      cursor: default;
    }
    .home-task-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
    }

    .home-task-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    .home-task-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .home-task-dot.success { background: var(--status-done); }
    .home-task-dot.failed { background: #ea4335; }
    .home-task-dot.running { background: var(--status-running); animation: pulse 2s ease-in-out infinite; }
    .home-task-status {
      font-size: 10px;
      color: var(--text-tertiary);
    }

    .home-task-time {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-left: auto;
    }

    .home-sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
    }
    .home-site-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .home-site-tile:hover { background: var(--sidebar-hover); }

    .home-site-favicon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      object-fit: contain;
      background: var(--input-bg);
    }
    .home-site-label {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
      text-align: center;
    }

    /* Settings modal */
    .settings-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
    }
    .settings-overlay.hidden { display: none; }
    .settings-modal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
    }
    .settings-close {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .settings-close:hover { color: var(--text); }
    .settings-body { padding: 20px; }
    .settings-section { margin-bottom: 20px; }
    .settings-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
      margin-bottom: 10px;
    }
    .settings-radio {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }
    .settings-radio input[type="radio"] {
      accent-color: var(--accent);
    }
    .settings-url-row {
      margin-top: 6px;
      padding-left: 24px;
    }
    .settings-url-row.hidden { display: none; }
    .settings-url-row input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }
    .settings-url-row input:focus { border-color: var(--speech-spotlight); }
    .settings-divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }
    .settings-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
    }
    .settings-user.hidden { display: none; }
    .settings-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--input-bg);
    }
    .settings-user-info { flex: 1; min-width: 0; }
    .settings-user-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .settings-user-email {
      font-size: 11px;
      color: var(--text-tertiary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .settings-logout-btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .settings-logout-btn:hover { background: var(--sidebar-hover); color: var(--text); }
    .google-login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 10px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .google-login-btn:hover { background: var(--sidebar-hover); }
    .google-login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .google-login-btn svg {
      width: 18px;
      height: 18px;
    }
    .settings-error {
      color: #ea4335;
      font-size: 12px;
      margin-top: 8px;
    }
    .settings-error:empty { display: none; }
    .settings-gear {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 14px;
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 4px;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .settings-gear:hover { color: var(--text); background: var(--sidebar-hover); }

  </style>
</head>
<body>
  <div class="main-layout">
    <div class="sidebar">
      <div class="task-section">
        <button class="new-task-btn" id="newTaskBtn2">New Task</button>
        <button class="log-btn" id="logToggle">Logs</button>
      </div>
      <div class="tabs-header">
        <span>Tabs</span>
        <button class="new-tab-btn" id="newTabBtn" title="New tab">+</button>
      </div>
      <div class="tab-list" id="tabList"></div>
    </div>
    <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
    <div class="right-column">
      <div class="title-bar">
        <span class="title-text">Vroom</span>
        <div class="nav-buttons">
          <button class="nav-btn" id="navBack" title="Back" disabled>&#x25C0;</button>
          <button class="nav-btn" id="navForward" title="Forward" disabled>&#x25B6;</button>
          <button class="nav-btn" id="navRefresh" title="Refresh" disabled><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c2 0 3.8 1 4.8 2.5"/><polyline points="13.5 2 13.5 5 10.5 5"/></svg></button>
        </div>
        <div class="url-bar">
          <input type="text" id="urlBar" placeholder="Enter URL..." />
        </div>
        <div class="status-area">
          <button class="take-control-btn hidden" id="takeControlBtn" title="Take control"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 2l12 10h-6l4 8-3 1-4-8-3 3z"/></svg></button>
          <button class="settings-gear" id="settingsBtn" title="Settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
          <button class="theme-toggle" id="themeToggle" title="Toggle theme">&#x263E;</button>
          <div class="status-dot" id="statusDot"></div>
          <span class="status-text" id="statusText">connecting</span>
        </div>
      </div>
      <div class="right-body">
        <div class="content-area">
          <div class="content-view">
            <div class="webview-layer" id="webviewLayer"></div>
            <div class="grid" id="grid">
              <div class="empty-state" id="emptyState"></div>
            </div>
            <div class="grid-controls" id="gridControls">
              <button class="unmute-btn" id="unmuteBtn" title="Push to talk"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="2" x2="22" y2="22"/></svg></button>
              <button class="pause-btn" id="pauseBtn" title="Pause agents"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
            </div>
          </div>
          <div class="log-resize-handle" id="logResizeHandle"></div>
          <div class="log-panel" id="logPanel">
            <div class="log-header">Log</div>
            <div class="log-entries" id="logEntries"></div>
          </div>
        </div>
        <div class="chat-sidebar hidden" id="chatPanel">
          <div class="panel-tabs">
            <button class="panel-tab active" id="tabChat">Chat</button>
            <button class="panel-tab" id="tabContracts">Contracts</button>
          </div>
          <div class="panel-content" id="panelChat">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-row">
              <input type="text" class="chat-input" id="chatInput" placeholder="Describe your task..." />
              <button class="chat-send-btn" id="chatSendBtn">Send</button>
            </div>
          </div>
          <div class="panel-content hidden" id="panelContracts">
            <div class="contracts-list" id="contractsList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Settings Modal -->
  <div class="settings-overlay hidden" id="settingsOverlay">
    <div class="settings-modal">
      <div class="settings-header">
        <span>Settings</span>
        <button class="settings-close" id="settingsClose">&times;</button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <div class="settings-section-title">Server</div>
          <label class="settings-radio">
            <input type="radio" name="serverMode" value="managed" checked />
            <span>Managed</span>
          </label>
          <label class="settings-radio">
            <input type="radio" name="serverMode" value="selfhosted" />
            <span>Self-hosted</span>
          </label>
          <div class="settings-url-row hidden" id="selfhostedUrlRow">
            <input type="text" id="selfhostedUrl" placeholder="ws://your-server:8765" />
          </div>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-section">
          <div class="settings-section-title">Account</div>
          <div class="settings-user hidden" id="settingsUser">
            <img class="settings-avatar" id="settingsAvatar" />
            <div class="settings-user-info">
              <div class="settings-user-name" id="settingsUserName"></div>
              <div class="settings-user-email" id="settingsUserEmail"></div>
            </div>
            <button class="settings-logout-btn" id="logoutBtn">Logout</button>
          </div>
          <button class="google-login-btn" id="googleLoginBtn">
            <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Login with Google
          </button>
          <div class="settings-error" id="settingsError"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>

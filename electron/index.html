<!DOCTYPE html>
<html>
<head>
  <title>Vroom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
    }

    :root {
      --bg: #fff;
      --bg-secondary: #f8f9fa;
      --bg-card: #fff;
      --border: #e0e0e0;
      --border-subtle: #f0f0f0;
      --text: #202124;
      --text-secondary: #5f6368;
      --text-tertiary: #9aa0a6;
      --accent: #202124;
      --input-bg: #f1f3f4;
      --btn-bg: #202124;
      --btn-text: #fff;
      --btn-hover: #3c4043;
      --btn-disabled-bg: #e0e0e0;
      --btn-disabled-text: #9aa0a6;
      --card-active: #f8f9fa;
      --screenshot-bg: #f1f3f4;
      --status-done: #188038;
      --status-running: #1a73e8;
      --speech-queued: #e8710a;
      --speech-spotlight: #1a73e8;
      --log-bg: #f8f9fa;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #202124;
        --bg-secondary: #292a2d;
        --bg-card: #292a2d;
        --border: #3c4043;
        --border-subtle: #35363a;
        --text: #e8eaed;
        --text-secondary: #9aa0a6;
        --text-tertiary: #5f6368;
        --accent: #e8eaed;
        --input-bg: #35363a;
        --btn-bg: #e8eaed;
        --btn-text: #202124;
        --btn-hover: #d2d4d7;
        --btn-disabled-bg: #3c4043;
        --btn-disabled-text: #5f6368;
        --card-active: #35363a;
        --screenshot-bg: #1a1a1d;
        --status-done: #81c995;
        --status-running: #8ab4f8;
        --speech-queued: #fdd663;
        --speech-spotlight: #8ab4f8;
        --log-bg: #292a2d;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
    }

    .tab-bar {
      display: flex;
      align-items: flex-end;
      padding-left: 80px; /* space for traffic lights */
      padding-top: 8px;
      padding-right: 12px;
      gap: 2px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      min-height: 44px;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-bar .browser-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: transparent;
      border: none;
      border-radius: 8px 8px 0 0;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      max-width: 200px;
      min-width: 0;
      -webkit-app-region: no-drag;
      transition: background 0.1s;
    }
    .tab-bar .browser-tab:hover {
      background: var(--input-bg);
    }
    .tab-bar .browser-tab.active {
      background: var(--bg);
      color: var(--text);
    }
    .tab-bar .browser-tab.focused {
      background: var(--bg);
      color: var(--text);
      border-bottom: 2px solid var(--status-running);
    }
    .tab-bar .browser-tab .tab-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tab-bar .browser-tab .tab-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tab-bar .browser-tab .tab-dot.running { background: var(--status-running); }
    .tab-bar .browser-tab .tab-dot.done { background: var(--status-done); }
    .tab-bar .browser-tab .tab-dot.speaking { background: var(--speech-spotlight); }
    .tab-bar .status-area {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      padding: 8px 8px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    .tab-bar .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
    }
    .tab-bar .status-dot.connected { background: var(--status-done); }
    .tab-bar .status-text {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    .task-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      -webkit-app-region: no-drag;
    }
    .task-bar input {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 24px;
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }
    .task-bar input::placeholder { color: var(--text-tertiary); }
    .task-bar input:focus {
      box-shadow: 0 0 0 2px var(--speech-spotlight);
    }
    .task-bar button {
      padding: 10px 28px;
      border: none;
      border-radius: 24px;
      background: var(--btn-bg);
      color: var(--btn-text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .task-bar button:hover { background: var(--btn-hover); }
    .task-bar button:disabled {
      background: var(--btn-disabled-bg);
      color: var(--btn-disabled-text);
      cursor: not-allowed;
    }

    .content {
      display: flex;
      flex: 1;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }

    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      grid-auto-rows: 1fr;
      gap: 1px;
      padding: 1px;
      background: var(--border);
    }

    .tab-card {
      background: var(--bg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tab-card.active { background: var(--card-active); }

    .tab-card .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      gap: 12px;
    }
    .tab-card .card-header .tab-label {
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .tab-card .card-header .tab-status {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--status-running);
      font-weight: 500;
      white-space: nowrap;
    }
    .tab-card .card-header .tab-status.done {
      color: var(--status-done);
    }
    .tab-card .card-header .speech-indicator {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      background: transparent;
      color: var(--text-tertiary);
      font-weight: 500;
      white-space: nowrap;
      display: none;
    }
    .tab-card .card-header .speech-indicator.queued {
      display: inline-block;
      background: var(--input-bg);
      color: var(--speech-queued);
    }
    .tab-card .card-header .speech-indicator.spotlight {
      display: inline-block;
      background: var(--input-bg);
      color: var(--speech-spotlight);
    }

    .tab-card .screenshot-container {
      position: relative;
      background: var(--screenshot-bg);
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .tab-card .screenshot-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .tab-card .screenshot-container .placeholder {
      color: var(--text-tertiary);
      font-size: 13px;
    }
    .tab-card .step-info {
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border-subtle);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-panel {
      width: 320px;
      background: var(--log-bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .log-panel .log-header {
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .log-panel .log-entries {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      font-size: 12px;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    }
    .log-panel .log-entry {
      padding: 6px 16px;
      border-bottom: 1px solid var(--border-subtle);
      line-height: 1.5;
      color: var(--text-secondary);
    }
    .log-panel .log-entry.highlight { color: var(--text); }

    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      background: var(--bg);
    }
    .empty-state p {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="tab-bar" id="tabBar">
    <div class="status-area">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">connecting</span>
    </div>
  </div>
  <div class="task-bar">
    <input type="text" id="taskInput" placeholder="describe a task..." autofocus />
    <button id="runBtn">Run</button>
  </div>
  <div class="content">
    <div class="grid" id="grid">
      <div class="empty-state" id="emptyState">
        <p>waiting for task</p>
      </div>
    </div>
    <div class="log-panel">
      <div class="log-header">Log</div>
      <div class="log-entries" id="logEntries"></div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>

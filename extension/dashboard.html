<!DOCTYPE html>
<html>
<head>
  <title>Vroom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
    }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      background: #0a0a0a;
      color: #ccc;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      background: #111;
      border-bottom: 1px solid #222;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .header .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
    }
    .header .status-dot.connected { background: #fff; }
    .header .status-text {
      font-size: 12px;
      color: #777;
    }

    .task-bar {
      display: flex;
      gap: 0;
      padding: 0;
      background: #111;
      border-bottom: 1px solid #222;
    }
    .task-bar input {
      flex: 1;
      padding: 12px 24px;
      border: none;
      background: transparent;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }
    .task-bar input::placeholder { color: #444; }
    .task-bar button {
      padding: 12px 32px;
      border: none;
      border-left: 1px solid #222;
      background: #fff;
      color: #000;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .task-bar button:hover { background: #ddd; }
    .task-bar button:disabled { background: #333; color: #111; cursor: not-allowed; }

    .content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      grid-auto-rows: 1fr;
      gap: 1px;
      padding: 1px;
      background: #222;
    }

    .tab-card {
      background: #0a0a0a;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tab-card.active { background: #0f0f0f; }

    .tab-card .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid #1a1a1a;
    }
    .tab-card .card-header .tab-label {
      font-size: 11px;
      font-weight: 400;
      color: #bbb;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 75%;
    }
    .tab-card .card-header .tab-status {
      font-size: 10px;
      padding: 2px 8px;
      border: 1px solid #444;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tab-card .card-header .tab-status.done {
      border-color: #fff;
      color: #fff;
    }

    .tab-card .screenshot-container {
      position: relative;
      background: #000;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .tab-card .screenshot-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .tab-card .screenshot-container .placeholder {
      color: #444;
      font-size: 12px;
      letter-spacing: 0.05em;
    }
    .tab-card .step-info {
      padding: 8px 16px;
      font-size: 11px;
      color: #777;
      border-top: 1px solid #1a1a1a;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-panel {
      width: 320px;
      background: #0a0a0a;
      border-left: 1px solid #222;
      display: flex;
      flex-direction: column;
    }
    .log-panel .log-header {
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid #222;
      color: #888;
    }
    .log-panel .log-entries {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      font-size: 11px;
    }
    .log-panel .log-entry {
      padding: 6px 16px;
      border-bottom: 1px solid #111;
      line-height: 1.5;
      color: #777;
    }
    .log-panel .log-entry.highlight { color: #fff; }

    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #444;
      background: #0a0a0a;
    }
    .empty-state p {
      font-size: 12px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Vroom</h1>
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">connecting</span>
  </div>
  <div class="task-bar">
    <input type="text" id="taskInput" placeholder="describe a task..." />
    <button id="runBtn">Run</button>
  </div>
  <div class="content">
    <div class="grid" id="grid">
      <div class="empty-state" id="emptyState">
        <p>waiting for task</p>
      </div>
    </div>
    <div class="log-panel">
      <div class="log-header">Log</div>
      <div class="log-entries" id="logEntries"></div>
    </div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>

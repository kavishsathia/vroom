name: Bug Report
description: Report a bug in Vroom
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Submit task "..."
        2. Agent spawns on tab
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any server or Electron console output
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Server (Python)
        - Electron app
        - Infrastructure
        - Other
    validations:
      required: true

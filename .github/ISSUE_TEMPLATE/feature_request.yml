name: Feature Request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like Vroom to do?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      placeholder: Why is this useful? What problem does it solve?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Have you considered other approaches?
